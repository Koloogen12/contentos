# ContentOS production stack on Selectel `mml-prod-1` (135.106.146.200).
#
# Coexists with mml / ohmybet / neurin etc. — this compose ONLY runs our
# own three services and reuses the host's native Postgres + Redis + nginx.
# DB / Redis / SSL / certbot are NOT in this file.
#
# Layout on the server:
#   /opt/contentos/backend/        (clone of github.com/Koloogen12/contentos)
#   /opt/contentos/frontend/       (clone of github.com/Koloogen12/contentos-front)
#   /opt/contentos/deploy/compose.prod.yml   (this file)
#   /opt/contentos/deploy/.env               (PUBLIC_URL_*, DOMAIN — see .env.prod.example)
#   /etc/contentos/secrets.env               (root, 600 — JWT/PG_PASS/REDIS_PASS/CometAPI/etc.)
#
# Networking: host-mode for api/worker so they reach 127.0.0.1:5432/6379.
# Frontend doesn't need host network — listens on 127.0.0.1:8097 via port mapping.
#
# Reverse proxy: existing nginx terminates TLS and proxies:
#   https://draft.neurin.tech       → 127.0.0.1:8097 (frontend)
#   https://api.draft.neurin.tech   → 127.0.0.1:8096 (api)

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - /etc/contentos/secrets.env
    environment:
      DATABASE_URL: postgresql+asyncpg://contentos:${POSTGRES_PASSWORD}@127.0.0.1:5432/contentos
      DATABASE_SYNC_URL: postgresql+psycopg://contentos:${POSTGRES_PASSWORD}@127.0.0.1:5432/contentos
      REDIS_URL: redis://:${REDIS_PASSWORD}@127.0.0.1:6379/5
      APP_ENV: production
      APP_DEBUG: "false"
      CORS_ORIGINS: ${PUBLIC_URL_FRONT}
      MAX_UPLOAD_SIZE_MB: "500"
      TEMP_DIR: /tmp/contentos
    network_mode: host
    volumes:
      - media-cache:/tmp/contentos
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 127.0.0.1 --port 8096 --proxy-headers --forwarded-allow-ips='*'"
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - /etc/contentos/secrets.env
    environment:
      DATABASE_URL: postgresql+asyncpg://contentos:${POSTGRES_PASSWORD}@127.0.0.1:5432/contentos
      REDIS_URL: redis://:${REDIS_PASSWORD}@127.0.0.1:6379/5
      APP_ENV: production
      APP_DEBUG: "false"
    network_mode: host
    volumes:
      - media-cache:/tmp/contentos
    command: ["arq", "app.workers.queue.WorkerSettings"]
    restart: unless-stopped
    depends_on:
      - api

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_URL_API}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_URL_API}
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:8098:3000"
    restart: unless-stopped

volumes:
  media-cache:
