# ContentOS nginx site for Selectel `mml-prod-1`.
# Single-domain layout — only `__DOMAIN__` needs an A-record (api.* skipped).
#   __DOMAIN__/api/*   → FastAPI on 127.0.0.1:8096 (path stripped to /api/*)
#   __DOMAIN__/*       → Next.js on 127.0.0.1:8097
#
# certbot will rewrite this in place to add :443 ssl + :80 → :443 redirect.

upstream contentos_frontend {
    server 127.0.0.1:8097;
    keepalive 32;
}

upstream contentos_api {
    server 127.0.0.1:8096;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # ACME challenge passthrough
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Generous body limit for audio / file uploads
    client_max_body_size 600M;

    # Default proxy headers
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # SSE skill-run stream — long timeouts, no buffering
    location ~ ^/api/v1/skill-runs/.+/stream$ {
        proxy_pass http://contentos_api;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Backend API + auth + everything under /api/
    location /api/ {
        proxy_pass http://contentos_api;
        proxy_connect_timeout 30s;
        proxy_send_timeout 5m;
        proxy_read_timeout 5m;
    }

    # Backend health check
    location = /health {
        proxy_pass http://contentos_api/health;
    }

    # Public canvas viewer route lives under frontend (/p/{token}) — passthrough handled by default block.
    # Default → Next.js frontend
    location / {
        proxy_pass http://contentos_frontend;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
